name: One-Code CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pylsp python-lsp-server jieba

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all Python files
        run: |
          python -m py_compile $(find . -name "*.py" -not -path "./__pycache__/*" -not -path "./.git/*" -not -path "./arch_backups/*")
