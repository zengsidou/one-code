<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>One-Code</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--fg:#c9d1d9;--fg2:#8b949e;--accent:#58a6ff;--green:#3fb950;--err:#f85149;--warn:#d29922;--border:#30363d;--radius:6px;--fs:16px}
body{font:var(--fs)/1.5 'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);display:flex;height:100vh}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{padding:calc(var(--fs)*0.6) calc(var(--fs)*1.2);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0}
.header .title{font-size:calc(var(--fs)*1.2);font-weight:600;color:var(--accent)}
.chat{flex:1;overflow-y:auto;padding:calc(var(--fs)*0.8)}
.msg{margin-bottom:calc(var(--fs)*0.6);padding:calc(var(--fs)*0.5) calc(var(--fs)*0.8);border-radius:var(--radius);max-width:92%;line-height:1.5;font-size:calc(var(--fs)*1.05)}
.msg.user{background:var(--accent);color:#fff;margin-left:auto}
.msg.agent{background:var(--bg2);border:1px solid var(--border)}
.msg.system{color:var(--fg2);font-size:calc(var(--fs)*0.85);text-align:center;background:transparent;border:none;padding:4px}
.msg.error{background:#3a1a1a;color:var(--err);border:1px solid var(--err)}
.input-bar{padding:calc(var(--fs)*0.6) calc(var(--fs)*1);background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:calc(var(--fs)*0.4);flex-shrink:0;position:relative}
.input-bar input{flex:1;padding:calc(var(--fs)*0.5) calc(var(--fs)*0.8);background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:var(--radius);font-size:calc(var(--fs)*1.1);outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar button{padding:calc(var(--fs)*0.5) calc(var(--fs)*1.2);background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:calc(var(--fs)*0.95);font-weight:600}
.mode-btn{padding:calc(var(--fs)*0.15) calc(var(--fs)*0.7);border:1px solid var(--border);border-radius:calc(var(--fs)*0.7);background:transparent;color:var(--fg2);cursor:pointer;font-size:calc(var(--fs)*0.8)}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.stats{width:calc(var(--fs)*13);background:var(--bg2);border-left:1px solid var(--border);padding:calc(var(--fs)*0.7);font-size:calc(var(--fs)*0.8);flex-shrink:0;overflow-y:auto}
.stats h3{color:var(--fg2);font-size:calc(var(--fs)*0.8);margin-bottom:calc(var(--fs)*0.4)}
.stats .sr{display:flex;justify-content:space-between;margin-bottom:calc(var(--fs)*0.3)}
.stats .sl{color:var(--fg2)} .stats .sv{color:var(--fg);font-weight:600}
#suggestBox div{padding:calc(var(--fs)*0.4) calc(var(--fs)*0.8);cursor:pointer;font-size:calc(var(--fs)*0.9);color:var(--fg);border-bottom:1px solid var(--border)}
#suggestBox div:hover{background:var(--bg3)}
#statusBadge{font-size:calc(var(--fs)*0.8);padding:2px 10px;border-radius:10px}
#statusBadge.idle{background:#1a3a2a;color:var(--green)} #statusBadge.running{background:#3a2a1a;color:var(--warn)}
.thinking{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style></head><body>
<div class="main">
 <div class="header">
  <span class="title">One-Code</span>
  <span id="cwd" style="color:var(--fg2);font-size:calc(var(--fs)*0.7);margin-left:10px">...</span>
  <span style="margin-left:auto;display:flex;align-items:center;gap:5px">
   <select id="modelSel" onchange="switchModel(this.value)" style="background:var(--bg3);color:var(--accent);border:1px solid var(--border);border-radius:3px;font-size:calc(var(--fs)*0.75);padding:1px 4px"></select>
   <button class="mode-btn active" onclick="setMode('build')">Build</button>
   <button class="mode-btn" onclick="setMode('plan')">Plan</button>
   <span id="statusBadge" class="idle">Ready</span>
  </span>
 </div>
 <div class="chat" id="chat"><div class="msg system">One-Code ready.</div></div>
 <div class="input-bar">
  <input type="text" id="inp" placeholder="Input task..." onkeydown="if(event.key==='Enter')send()" oninput="showSuggest(event)" autocomplete="off">
  <button onclick="send()">Send</button>
  <div id="suggestBox" style="display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);max-height:160px;overflow-y:auto;z-index:100"></div>
 </div>
</div>
<div class="stats">
 <h3>Tasks</h3><div id="taskList" style="font-size:calc(var(--fs)*0.7)"></div><hr>
 <div class="sr"><span class="sl">Model</span><span class="sv" id="modelVal">-</span></div>
 <div class="sr"><span class="sl">Mode</span><span class="sv" id="modeVal">build</span></div>
 <div class="sr"><span class="sl">Tools</span><span class="sv" id="toolVal">-</span></div>
 <div class="sr"><span class="sl">Tokens</span><span class="sv" id="tokenVal">-</span></div>
 <div class="sr"><span class="sl">Cost</span><span class="sv" id="costVal">¥0</span></div>
 <div class="sr"><span class="sl">Steps</span><span class="sv" id="stepVal">0</span></div>
</div>
<script>
var esc=s=>{var d=document.createElement('div');d.textContent=s;return d.innerHTML};
var step=0;
function send(){
 var t=document.getElementById('inp').value.trim();if(!t)return;
 document.getElementById('inp').value='';
 document.getElementById('statusBadge').textContent='...';document.getElementById('statusBadge').className='running';
 chat('<b>'+esc(t)+'</b>','user');
 chat('<span class="thinking">...</span>','system','thinking');
 step++;document.getElementById('stepVal').textContent=step;
 fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})})
  .then(r=>r.json()).then(d=>{
   var el=document.getElementById('thinking');if(el)el.remove();
   if(d.error)chat(d.error,'error');
   else chat(d.response,'agent');
   document.getElementById('statusBadge').textContent='Ready';document.getElementById('statusBadge').className='idle';
  }).catch(e=>{
   var el=document.getElementById('thinking');if(el)el.remove();
   chat('Connection failed','error');
   document.getElementById('statusBadge').textContent='Ready';document.getElementById('statusBadge').className='idle';
  });
}
function chat(text,type,id){
 var d=document.createElement('div');d.className='msg '+type;if(id)d.id=id;
 if(type==='agent')d.innerHTML=md(text);else d.innerHTML=text;
 document.getElementById('chat').appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
}
function md(t){t=esc(t);t=t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');t=t.replace(/\n/g,'<br>');return t}
async function loadModels(){
 var r=await fetch('/api/models');var d=await r.json();
 var s=document.getElementById('modelSel');s.innerHTML='';
 d.models.forEach(function(m){s.innerHTML+='<option value=\"'+m.id+'\">'+m.name+'</option>'});
}
function switchModel(m){fetch('/api/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:m})})}
function setMode(m){
 fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:m})});
 document.querySelectorAll('.mode-btn').forEach(function(b,i){b.classList.toggle('active',i==(m==='build'?0:1))});
 document.getElementById('modeVal').textContent=m;
}
async function poll(){
 try{var r=await fetch('/api/usage');var d=await r.json();
  document.getElementById('tokenVal').textContent=d.tokens||0;
  document.getElementById('costVal').textContent='¥'+(d.cost||0).toFixed(4);
  document.getElementById('modelVal').textContent=d.model||'-';
 }catch(e){}
 try{var r2=await fetch('/api/status');var d2=await r2.json();
  document.getElementById('toolVal').textContent=d2.tools||'-';
 }catch(e){}
 try{var r3=await fetch('/api/tasks');var d3=await r3.json();
  var h='';d3.tasks.forEach(function(t){
   var s={'pending':'○','in_progress':'●','done':'✓','abandoned':'✗'}[t.status]||'?';
   h+='<div>'+s+' '+esc(t.title)+'</div>';
  });
  document.getElementById('taskList').innerHTML=h||'no tasks';
 }catch(e){}
}
// suggestions
var sc=[];
fetch('/api/suggest?q=').then(r=>r.json()).then(d=>{sc=d.suggestions||[]});
function showSuggest(e){
 var q=e.target.value.toLowerCase();if(!q){document.getElementById('suggestBox').style.display='none';return}
 var m=sc.filter(s=>s.toLowerCase().includes(q)).slice(0,5);
 if(!m.length){document.getElementById('suggestBox').style.display='none';return}
 var b=document.getElementById('suggestBox');
 b.innerHTML=m.map(s=>'<div onclick="pick(\''+esc(s)+'\')">'+esc(s)+'</div>').join('');
 b.style.display='block';
}
function pick(t){document.getElementById('inp').value=t;document.getElementById('suggestBox').style.display='none';send()}
// init
(function(){
 var dpr=window.devicePixelRatio||1;
 document.documentElement.style.setProperty('--fs',Math.max(16,Math.min(40,Math.round(16*dpr*(screen.availWidth/1920))))+'px');
})();
fetch('/api/cwd').then(r=>r.json()).then(d=>{document.getElementById('cwd').textContent=d.cwd||'-'});
loadModels();setInterval(poll,3000);
</script></body></html>
