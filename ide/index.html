<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>One-Code</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--fs:20px}
body{font:var(--fs)/1.5 system-ui,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}
.main{flex:1;display:flex;flex-direction:column}
.h{display:flex;align-items:center;gap:calc(var(--fs)*0.5);padding:calc(var(--fs)*0.4) calc(var(--fs)*0.7);background:#161b22;border-bottom:1px solid #30363d}
.h .t{font-size:calc(var(--fs)*1.1);font-weight:700;color:#58a6ff}
.chat{flex:1;overflow-y:auto;padding:calc(var(--fs)*0.7)}
.msg{margin-bottom:calc(var(--fs)*0.5);padding:calc(var(--fs)*0.4) calc(var(--fs)*0.6);border-radius:6px;max-width:92%;line-height:1.5;font-size:var(--fs);word-break:break-word}
.usr{background:#58a6ff;color:#fff;margin-left:auto}
.agt{background:#161b22;border:1px solid #30363d}
.sys{color:#8b949e;font-size:calc(var(--fs)*0.85);text-align:center;border:none;padding:calc(var(--fs)*0.2)}
.err{background:#3a1a1a;color:#f85149;border:1px solid #f85149}
.inp{display:flex;gap:calc(var(--fs)*0.4);padding:calc(var(--fs)*0.5) calc(var(--fs)*0.7);background:#161b22;border-top:1px solid #30363d}
.inp input{flex:1;padding:calc(var(--fs)*0.4) calc(var(--fs)*0.6);background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;font-size:var(--fs);outline:none}
.inp input:focus{border-color:#58a6ff}
.inp button{padding:calc(var(--fs)*0.4) calc(var(--fs)*0.9);background:#58a6ff;color:#fff;border:none;border-radius:4px;font-size:calc(var(--fs)*0.95);cursor:pointer}
.panel{width:calc(var(--fs)*9);background:#161b22;border-left:1px solid #30363d;padding:calc(var(--fs)*0.6);font-size:calc(var(--fs)*0.85);overflow-y:auto}
.panel h3{color:#8b949e;font-size:calc(var(--fs)*0.8);margin-bottom:calc(var(--fs)*0.3)}
.panel .t{padding:calc(var(--fs)*0.1) 0}
select{background:#21262d;color:#58a6ff;border:1px solid #30363d;border-radius:3px;padding:calc(var(--fs)*0.1) calc(var(--fs)*0.2);font-size:calc(var(--fs)*0.8)}
.btn{padding:calc(var(--fs)*0.1) calc(var(--fs)*0.4);border:1px solid #30363d;border-radius:calc(var(--fs)*0.5);background:transparent;color:#8b949e;cursor:pointer;font-size:calc(var(--fs)*0.8)}
.btn.on{background:#58a6ff;border-color:#58a6ff;color:#fff}
.dot{width:calc(var(--fs)*0.4);height:calc(var(--fs)*0.4);border-radius:50%;background:#3fb950;display:inline-block}
.ctx:hover .ctx-tt{display:block}
</style>
<script>document.documentElement.style.setProperty('--fs',Math.max(16,Math.min(34,Math.round(16*(window.devicePixelRatio||1)*screen.availWidth/1920)))+'px')</script>
</head><body>
<div class="main">
 <div class="h">
  <span class="dot" id="dot"></span>
  <span class="t">One-Code</span>
  <span id="cwd" style="color:#8b949e;font-size:calc(var(--fs)*0.8)">D:\one-code</span>
  <span id="status" style="color:#8b949e;font-size:calc(var(--fs)*0.75);margin-left:8px;min-width:200px">Ready</span>
  <span style="margin-left:auto;display:flex;gap:6px;align-items:center">
   <select id="sel" onchange="SW(this.value)"></select>
   <button class="btn on" onclick="SM('build')">Build</button>
   <button class="btn" onclick="SM('plan')">Plan</button>
  </span>
 </div>
 <div class="chat" id="chat"><div class="msg sys">One-Code 就绪。</div></div>
 <div class="inp">
  <input id="inp" placeholder="输入任务..." onkeydown="if(event.key==='Enter')S()">
  <button onclick="S()">发送</button>
 </div>
</div>
<div class="panel">
 <h3>Context</h3>
 <div style="font-weight:700;font-size:calc(var(--fs)*1.1)" id="ctxTokens">-</div>
 <div style="color:#8b949e;font-size:calc(var(--fs)*0.8)" id="ctxPct">-</div>
 <div style="color:#8b949e;font-size:calc(var(--fs)*0.8)" id="ctxCost">-</div>
 <hr style="border-color:#30363d;margin:calc(var(--fs)*0.5) 0">
 <h3>工作目录</h3>
 <div style="font-size:calc(var(--fs)*0.75);word-break:break-all" id="cwd">-</div>
 <hr style="border-color:#30363d;margin:calc(var(--fs)*0.5) 0">
 <h3>Tasks</h3><div id="tasks"></div>
</div>
<script>
var E=function(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function M(t){t=E(t);t=t.replace(/```\w*\n([\s\S]*?)```/g,'<pre><code>$1</code></pre>');t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');t=t.replace(/\n/g,'<br>');return t}
function A(t,y,i){var d=document.createElement('div');d.className='msg '+y;if(i)d.id=i;d.innerHTML=y==='agt'?M(t):t;document.getElementById('chat').appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'})}
function S(){var t=document.getElementById('inp').value.trim();if(!t)return
 document.getElementById('inp').value='';var st=Date.now()
 document.getElementById('dot').style.background='#d29922'
 document.getElementById('status').textContent='Thinking...'
 var timer=setInterval(function(){document.getElementById('status').textContent='Thinking... ('+Math.round((Date.now()-st)/1000)+'s)'},500)
 A('<b>'+E(t)+'</b>','usr')
 fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})})
  .then(r=>r.json()).then(d=>{
   clearInterval(timer);var elapsed=Math.round((Date.now()-st)/1000)
   document.getElementById('dot').style.background='#3fb950';document.getElementById('status').textContent='Ready'
   if(d.error)A(d.error,'err')
   else{A('<div style="font-size:calc(var(--fs)*0.65);color:#8b949e;margin-bottom:2px">Thought: '+elapsed+'s</div>','sys');A(d.response,'agt')}
   pollUsage()
  })
}
function pollUsage(){
 fetch('/api/usage').then(r=>r.json()).then(d=>{
  var t=d.tokens||0,m=d.max_tokens||65536,p=Math.round(t/m*100)
  document.getElementById('ctxTokens').textContent=t.toLocaleString()+' tokens'
  document.getElementById('ctxPct').textContent=p+'% of '+m.toLocaleString()
  document.getElementById('ctxCost').textContent='¥'+(d.cost||0).toFixed(2)+' spent'
 }).catch(function(){})
}
function SW(m){fetch('/api/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:m})})}
function SM(m){fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:m})})
 document.querySelectorAll('.btn').forEach(function(b,i){b.classList.toggle('on',(m==='build'&&i===0)||(m==='plan'&&i===1))})
}
setInterval(async function(){
 try{var r=await fetch('/api/tasks');var d=await r.json();
  document.getElementById('tasks').innerHTML=d.tasks.map(function(t){
   var s={pending:'○',in_progress:'●',done:'✓',abandoned:'✗'}[t.status]||'?'
   return'<div class="t">'+s+' '+E(t.title)+'</div>'
  }).join('')||'<div class="t" style="color:#8b949e">无任务</div>'
 }catch(e){}
},3000)
fetch('/api/models').then(r=>r.json()).then(d=>{document.getElementById('sel').innerHTML=d.models.map(m=>'<option value="'+m.id+'">'+m.name+'</option>').join('')})
fetch('/api/cwd').then(r=>r.json()).then(d=>{document.getElementById('cwd').textContent=d.cwd||'-'})
pollUsage()
setInterval(function(){pollUsage()},5000)
</script></body></html>
