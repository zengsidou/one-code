<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One-Code IDE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--fg:#c9d1d9;
  --fg2:#8b949e;--accent:#58a6ff;--accent2:#3fb950;--err:#f85149;
  --warn:#d29922;--border:#30363d;--radius:6px;
  --fs:16px;
}
body{font:var(--fs)/1.5 'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);display:flex;height:100vh;overflow:hidden}
/* sidebar */
.sidebar{
  width:calc(var(--fs)*17.5);background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.sidebar h2{font-size:var(--fs);color:var(--fg2);padding:calc(var(--fs)*0.7) calc(var(--fs)*1.2) calc(var(--fs)*0.3);text-transform:uppercase;letter-spacing:.5px}
.file-tree{flex:1;overflow-y:auto;padding:calc(var(--fs)*0.3) 0;font-size:var(--fs)}
.file-tree .item{padding:calc(var(--fs)*0.25) calc(var(--fs)*1.2);cursor:pointer;display:flex;align-items:center;gap:calc(var(--fs)*0.5);white-space:nowrap}
.file-tree .item:hover{background:var(--bg3)}
.file-tree .item.dir{color:var(--accent)}
.file-tree .item.file{color:var(--fg)}
.file-tree .item .icon{font-size:calc(var(--fs)*0.9);width:calc(var(--fs)*1.2);text-align:center}
/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{
  padding:calc(var(--fs)*0.6) calc(var(--fs)*1.2);background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;font-size:calc(var(--fs)*1.1);flex-shrink:0;
}
.header .title{font-size:calc(var(--fs)*1.3);font-weight:600;color:var(--accent)}
.header .status{font-size:var(--fs);padding:calc(var(--fs)*0.2) calc(var(--fs)*0.8);border-radius:calc(var(--fs)*0.8)}
.status.idle{background:#1a3a2a;color:var(--accent2)}
.status.running{background:#3a2a1a;color:var(--warn)}
.status.error{background:#3a1a1a;color:var(--err)}
/* chat */
.chat{flex:1;overflow-y:auto;padding:calc(var(--fs)*0.9)}
.msg{margin-bottom:calc(var(--fs)*0.8);padding:calc(var(--fs)*0.6) calc(var(--fs)*1);border-radius:var(--radius);max-width:90%;line-height:1.6;font-size:calc(var(--fs)*1.1)}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;margin-left:auto}
.msg.agent{background:var(--bg2);border:1px solid var(--border)}
.msg.system{background:transparent;color:var(--fg2);font-size:calc(var(--fs)*0.9);text-align:center}
.msg.error{background:#3a1a1a;color:var(--err);border:1px solid var(--err);font-size:calc(var(--fs)*1.1)}
.msg.tool{background:#1a2a3a;border:1px solid var(--accent);color:var(--fg);margin:calc(var(--fs)*0.4) 0;font-size:calc(var(--fs)*0.9)}
.msg.tool .tool-name{color:var(--accent);font-weight:600;margin-bottom:4px}
.msg.tool .tool-result{font-family:'Cascadia Code',Consolas,monospace;font-size:calc(var(--fs)*0.85);max-height:200px;overflow-y:auto;white-space:pre-wrap;background:var(--bg);padding:calc(var(--fs)*0.4) calc(var(--fs)*0.6);border-radius:4px;margin-top:4px}
.msg pre{background:var(--bg);border-radius:4px;padding:calc(var(--fs)*0.5);overflow-x:auto;font-size:calc(var(--fs)*0.9)}
.msg code{font-family:'Cascadia Code',Consolas,monospace;font-size:calc(var(--fs)*0.9);background:var(--bg3);padding:2px 6px;border-radius:3px}
.msg pre code{background:none;padding:0}
/* input */
.input-bar{
  padding:calc(var(--fs)*0.7) calc(var(--fs)*1.2);background:var(--bg2);border-top:1px solid var(--border);
  display:flex;gap:calc(var(--fs)*0.5);flex-shrink:0;
}
.input-bar input{
  flex:1;padding:calc(var(--fs)*0.6) calc(var(--fs)*1);background:var(--bg);color:var(--fg);
  border:1px solid var(--border);border-radius:var(--radius);font-size:calc(var(--fs)*1.15);outline:none;
}
.input-bar input:focus{border-color:var(--accent)}
.input-bar input{position:relative;z-index:101}
.input-bar button{
  padding:calc(var(--fs)*0.6) calc(var(--fs)*1.5);background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius);cursor:pointer;font-size:calc(var(--fs)*1);font-weight:600;
}
.input-bar button:hover{opacity:0.9}
.input-bar button:disabled{opacity:0.5;cursor:default}
.mode-btn{padding:calc(var(--fs)*0.2) calc(var(--fs)*0.8);border:1px solid var(--border);border-radius:calc(var(--fs)*0.8);background:transparent;color:var(--fg2);cursor:pointer;font-size:calc(var(--fs)*0.85);transition:all .2s}
.mode-btn:hover{border-color:var(--accent);color:var(--fg)}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#suggestBox div{padding:calc(var(--fs)*0.5) calc(var(--fs)*1);cursor:pointer;font-size:calc(var(--fs)*1);color:var(--fg);border-bottom:1px solid var(--border)}
#suggestBox div:hover{background:var(--bg3)}
#suggestBox div:last-child{border-bottom:none}
/* stats panel */
.stats{width:calc(var(--fs)*15);background:var(--bg2);border-left:1px solid var(--border);padding:calc(var(--fs)*0.8);font-size:calc(var(--fs)*0.9);flex-shrink:0;overflow-y:auto}
.stats h3{color:var(--fg2);font-size:calc(var(--fs)*0.85);margin-bottom:calc(var(--fs)*0.5);text-transform:uppercase}
.stats .stat-row{display:flex;justify-content:space-between;margin-bottom:calc(var(--fs)*0.5)}
.stats .stat-label{color:var(--fg2)}
.stats .stat-val{color:var(--fg);font-weight:600;font-size:calc(var(--fs)*1)}
.stats button{font-size:calc(var(--fs)*0.85);padding:calc(var(--fs)*0.4)}
/* scroll */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* thinking */
.thinking{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
</style>
</head>
<body>
<div class="sidebar">
  <h2>Files</h2>
  <div class="file-tree" id="fileTree">加载中...</div>
  <h2>Tools</h2>
  <div class="file-tree" id="toolList" style="flex:none;max-height:200px"></div>
</div>
<div class="main">
  <div class="header">
    <span class="title">One-Code IDE</span>
    <span style="font-size:11px;color:var(--fg2)">
      <button class="mode-btn active" id="modeBuild" onclick="setMode('build')" style="margin-right:4px">Build</button>
      <button class="mode-btn" id="modePlan" onclick="setMode('plan')">Plan</button>
      <button class="mode-btn" id="modeCompose" onclick="setMode('compose')">Compose</button>
      &nbsp;|&nbsp; <span id="modelName" style="color:var(--accent)">deepseek-v4-pro</span>
      &nbsp; <span id="statusBadge" class="status idle">就绪</span>
    </span>
  </div>
  <div class="chat" id="chatBox">
    <div class="msg system">One-Code IDE 已就绪。输入编程任务开始。</div>
  </div>
  <div class="input-bar" style="position:relative">
    <input type="text" id="userInput" placeholder="输入编程任务... (Enter 发送)" onkeydown="handleKey(event)" oninput="showSuggest(event)" autocomplete="off">
    <button id="sendBtn" onclick="send()">发送</button>
    <div id="suggestBox" style="display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);max-height:160px;overflow-y:auto;z-index:100"></div>
  </div>
</div>
<div class="stats" id="statsPanel">
  <h3>状态</h3>
  <div class="stat-row"><span class="stat-label">工具数</span><span class="stat-val" id="toolCount">-</span></div>
  <div class="stat-row"><span class="stat-label">任务</span><span class="stat-val" id="taskCount">-</span></div>
  <div class="stat-row"><span class="stat-label">成功率</span><span class="stat-val" id="successRate">-</span></div>
  <div class="stat-row"><span class="stat-label">技能</span><span class="stat-val" id="skillCount">-</span></div>
  <hr>
  <h3>当前会话</h3>
  <div class="stat-row"><span class="stat-label">步骤</span><span class="stat-val" id="stepsVal">-</span></div>
  <div class="stat-row"><span class="stat-label">Token</span><span class="stat-val" id="tokenVal">-</span></div>
  <div class="stat-row"><span class="stat-label">费用</span><span class="stat-val" id="costVal">-</span></div>
  <div class="stat-row"><span class="stat-label">模型</span><span class="stat-val" id="modelVal">-</span></div>
  <button onclick="clearMemory()" style="width:100%;padding:4px;background:var(--bg3);color:var(--fg);border:1px solid var(--border);border-radius:4px;cursor:pointer;margin-bottom:4px">清空记忆</button>
  <button onclick="grow()" style="width:100%;padding:4px;background:var(--bg3);color:var(--fg);border:1px solid var(--border);border-radius:4px;cursor:pointer">生成挑战</button>
</div>
<script>
let running=false;
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function start(){
  await loadFiles();
  await updateStatus();
  await loadTools();
  fetchSuggestions();
  setInterval(updateStatus,10000);
}

function send(){
  var inp=document.getElementById('userInput');
  var msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  document.getElementById('statusBadge').textContent='思考中...';
  document.getElementById('statusBadge').className='status running';
  addMsg(msg,'user');
  addMsg('<span class="thinking">...</span>','system','thinkingMsg');
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})})
    .then(function(r){return r.json()})
    .then(function(data){
      removeEl('thinkingMsg');
      if(data.error)addMsg(data.error,'error');
      else addMsg(data.response,'agent');
      document.getElementById('statusBadge').textContent='就绪';
      document.getElementById('statusBadge').className='status idle';
      updateStatus();
    })
    .catch(function(e){
      removeEl('thinkingMsg');
      addMsg('连接失败','error');
      document.getElementById('statusBadge').textContent='就绪';
      document.getElementById('statusBadge').className='status idle';
    });
}

function renderMarkdown(text){
  if(!text)return '';
  text=esc(text);
  text=text.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code class="language-$1">$2</code></pre>');
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text=text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\n/g,'<br>');
  return text;
}

function addMsg(text,type,id){
  var div=document.createElement('div');
  div.className='msg '+type;
  if(id)div.id=id;
  if(type!=='agent')div.textContent=text;else div.innerHTML=text;
  document.getElementById('chatBox').appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
  return div;
}
function addToolCard(tool,result){
  var div=document.createElement('div');
  div.className='msg tool';
  div.innerHTML='<div class="tool-name">'+esc(tool)+'</div><div class="tool-result">'+esc(result||'')+'</div>';
  document.getElementById('chatBox').appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
  document.getElementById('stepsVal').textContent=parseInt(document.getElementById('stepsVal').textContent||0)+1;
}
function removeEl(id){var e=document.getElementById(id);if(e)e.remove()}

async function loadFiles(){
  try{
    var res=await fetch('/api/files');var data=await res.json();
    document.getElementById('fileTree').innerHTML=renderTree(data.files||[]);
  }catch(e){document.getElementById('fileTree').textContent='加载失败'}
}
function renderTree(files,prefix){
  var h='';
  files.forEach(function(f){
    var icon=f.type==='dir'?'[+]':'[-]';
    h+='<div class="item '+f.type+'" title="'+esc(f.path)+'"><span class="icon">'+icon+'</span>'+esc(f.name)+'</div>';
    if(f.children&&f.children.length)h+=renderTree(f.children,f.path);
  });
  return h||'<div class="item">(空)</div>';
}
async function loadTools(){
  try{
    var res=await fetch('/api/tools');var data=await res.json();
    document.getElementById('toolList').innerHTML=(data.tools||[]).map(function(t){return '<div class="item file">'+esc(t)+'</div>'}).join('');
  }catch(e){}
}

async function updateStatus(){
  try{
    var res=await fetch('/api/status');var data=await res.json();
    document.getElementById('toolCount').textContent=data.tools||'-';
    document.getElementById('taskCount').textContent=data.tasks||'0';
    document.getElementById('successRate').textContent=data.success_rate?Math.round(data.success_rate*100)+'%':'-';
    document.getElementById('skillCount').textContent=data.skills||'0';
    document.getElementById('tokenVal').textContent=data.token_count||'-';
  }catch(e){}
}
async function clearMemory(){await fetch('/api/clear',{method:'POST'});addMsg('记忆已清空','system')}
async function grow(){addMsg('生成挑战任务...','system');try{var res=await fetch('/api/grow',{method:'POST'});var data=await res.json();addMsg((data.challenges||[]).map(function(c){return'[L'+c.difficulty+'] '+c.task}).join('\n'),'agent')}catch(e){addMsg('生成失败: '+e.message,'error')}}
async function updateTools(){
  try{
    var res=await fetch('/api/tools');var data=await res.json();
    document.getElementById('toolList').innerHTML=(data.tools||[]).map(function(t){return '<div class="item file">'+esc(t)+'</div>'}).join('');
  }catch(e){}
}

// === suggestions ===
var suggestCache=[];
async function fetchSuggestions(){
  try{var r=await fetch('/api/suggest?q=');var d=await r.json();suggestCache=d.suggestions||[]}catch(e){}
}
function showSuggest(e){
  var q=e.target.value.toLowerCase();
  if(!q){document.getElementById('suggestBox').style.display='none';return}
  var matches=q?suggestCache.filter(function(s){return s.toLowerCase().includes(q)}).slice(0,5):suggestCache.slice(0,5);
  if(!matches.length){document.getElementById('suggestBox').style.display='none';return}
  var box=document.getElementById('suggestBox');
  box.innerHTML=matches.map(function(m){return '<div onclick="pickSuggest(\''+esc(m)+'\')">'+esc(m)+'</div>'}).join('');
  box.style.display='block';
}
function pickSuggest(text){
  document.getElementById('userInput').value=text;
  document.getElementById('suggestBox').style.display='none';
  send();
}
// === mode switching ===
var currentMode='build';
function setMode(mode){
  fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:mode})});
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('mode'+mode.charAt(0).toUpperCase()+mode.slice(1)).classList.add('active');
  currentMode=mode;
  document.getElementById('modelVal').textContent=mode==='plan'?'read-only':'full';
}
// === token/cost polling ===
setInterval(function(){
  fetch('/api/usage').then(function(r){return r.json()}).then(function(d){
    document.getElementById('tokenVal').textContent=d.tokens||0;
    document.getElementById('costVal').textContent='¥'+((d.cost||0).toFixed(4));
  }).catch(function(){});
},3000);

fetchSuggestions();
// === auto-scale to screen ===
(function(){
  var dpr=window.devicePixelRatio||1;
  var sw=screen.availWidth;
  var base=Math.round(16*dpr*(sw/1920));
  base=Math.max(16,Math.min(40,base));
  document.documentElement.style.setProperty('--fs',base+'px');
})();

start();
</script>
</body>
</html>
