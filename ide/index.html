<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>One-Code</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:18px/1.5 system-ui,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}
.main{flex:1;display:flex;flex-direction:column}
.h{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#161b22;border-bottom:1px solid #30363d}
.h .t{font-size:20px;font-weight:700;color:#58a6ff}
.chat{flex:1;overflow-y:auto;padding:14px}
.msg{margin-bottom:10px;padding:8px 12px;border-radius:6px;max-width:92%;line-height:1.5;font-size:18px;word-break:break-word}
.usr{background:#58a6ff;color:#fff;margin-left:auto}
.agt{background:#161b22;border:1px solid #30363d}
.sys{color:#8b949e;font-size:15px;text-align:center;border:none;padding:4px}
.err{background:#3a1a1a;color:#f85149;border:1px solid #f85149}
.inp{display:flex;gap:8px;padding:10px 14px;background:#161b22;border-top:1px solid #30363d}
.inp input{flex:1;padding:8px 12px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;font-size:18px;outline:none}
.inp input:focus{border-color:#58a6ff}
.inp button{padding:8px 18px;background:#58a6ff;color:#fff;border:none;border-radius:4px;font-size:17px;cursor:pointer}
.panel{width:180px;background:#161b22;border-left:1px solid #30363d;padding:12px;font-size:15px;overflow-y:auto}
.panel h3{color:#8b949e;font-size:14px;margin-bottom:6px}
.panel .t{padding:2px 0}
select{background:#21262d;color:#58a6ff;border:1px solid #30363d;border-radius:3px;padding:2px 4px;font-size:14px}
.btn{padding:2px 8px;border:1px solid #30363d;border-radius:10px;background:transparent;color:#8b949e;cursor:pointer;font-size:14px}
.btn.on{background:#58a6ff;border-color:#58a6ff;color:#fff}
.dot{width:8px;height:8px;border-radius:50%;background:#3fb950;display:inline-block}
</style></head><body>
<div class="main">
 <div class="h">
  <span class="dot" id="dot"></span>
  <span class="t">One-Code</span>
  <span id="cwd" style="color:#8b949e;font-size:13px">...</span>
  <span style="margin-left:auto;display:flex;gap:6px;align-items:center">
   <select id="sel" onchange="SW(this.value)"></select>
   <button class="btn on" onclick="SM('build')">Build</button>
   <button class="btn" onclick="SM('plan')">Plan</button>
  </span>
 </div>
 <div class="chat" id="chat"><div class="msg sys">One-Code ready.</div></div>
 <div class="inp">
  <input id="inp" placeholder="Task..." onkeydown="if(event.key==='Enter')S()">
  <button onclick="S()">Send</button>
 </div>
</div>
<div class="panel">
 <h3>Tasks</h3><div id="tasks"></div>
</div>
<script>
var E=function(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function M(t){t=E(t);t=t.replace(/```\w*\n([\s\S]*?)```/g,'<pre><code>$1</code></pre>');t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');t=t.replace(/\n/g,'<br>');return t}
function A(t,y,i){var d=document.createElement('div');d.className='msg '+y;if(i)d.id=i;d.innerHTML=y==='agt'?M(t):t;document.getElementById('chat').appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'})}
function S(){var t=document.getElementById('inp').value.trim();if(!t)return
 document.getElementById('inp').value='';document.getElementById('dot').style.background='#d29922'
 A('<b>'+E(t)+'</b>','usr');A('<span class="thinking">...</span>','sys','thinking')
 fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})})
  .then(r=>r.json()).then(d=>{
   var e=document.getElementById('thinking');if(e)e.remove()
   document.getElementById('dot').style.background='#3fb950'
   A(d.error||d.response,d.error?'err':'agt')
  })
}
function SW(m){fetch('/api/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:m})})}
function SM(m){fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:m})})
 document.querySelectorAll('.btn').forEach(function(b,i){b.classList.toggle('on',(m==='build'&&i===0)||(m==='plan'&&i===1))})
}
setInterval(async function(){
 try{var r=await fetch('/api/tasks');var d=await r.json();
  document.getElementById('tasks').innerHTML=d.tasks.map(function(t){
   var s={pending:'○',in_progress:'●',done:'✓',abandoned:'✗'}[t.status]||'?'
   return'<div class="t">'+s+' '+E(t.title)+'</div>'
  }).join('')||'<div class="t" style="color:#8b949e">no tasks</div>'
 }catch(e){}
},3000)
fetch('/api/models').then(r=>r.json()).then(d=>{document.getElementById('sel').innerHTML=d.models.map(m=>'<option value="'+m.id+'">'+m.name+'</option>').join('')})
fetch('/api/cwd').then(r=>r.json()).then(d=>{document.getElementById('cwd').textContent=d.cwd||'-'})
</script></body></html>
