<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One-Code IDE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar">
  <h2>One-Code</h2>
  <div class="stat">工具 <span id="toolCount">-</span></div>
  <div class="stat">任务 <span id="taskCount">-</span></div>
  <div class="stat">成功率 <span id="successRate">-</span></div>
  <div class="stat">技能 <span id="skillCount">-</span></div>
  <div class="stat">趋势 <span id="trend">-</span></div>
  <hr>
  <h2>工具列表</h2>
  <ul class="tool-list" id="toolList"></ul>
  <hr>
  <button onclick="clearMemory()">清空记忆</button>
  <button onclick="grow()">生成挑战</button>
  <button id="themeBtn" onclick="toggleTheme()">🌙 深色主题</button>
</div>
<div class="main">
  <div class="header">
    <span>One-Code IDE &mdash; DeepSeek V4</span>
    <span class="status idle" id="statusBadge">就绪</span>
  </div>
  <div class="chat" id="chatBox">
    <div class="msg system">One-Code IDE 已就绪。输入编程任务开始。</div>
  </div>
  <div class="input-bar">
    <input type="text" id="userInput" placeholder="输入编程任务... (Enter 发送)" onkeydown="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>
<script>
let running = false;
async function send() {
  var input = document.getElementById('userInput');
  var msg = input.value.trim();
  if (!msg || running) return;
  input.value = '';
  running = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('statusBadge').textContent = '思考中...';
  document.getElementById('statusBadge').className = 'status running';
  addMessage(msg, 'user');
  addMessage('<span class="thinking">思考中</span>', 'system', 'thinkingMsg');
  try {
    var res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
    var data = await res.json();
    removeMessage('thinkingMsg');
    if (data.error) { addMessage(data.error, 'error'); }
    else { addMessage(data.response, 'agent'); }
  } catch (e) {
    removeMessage('thinkingMsg');
    addMessage('连接失败: ' + e.message, 'error');
  }
  running = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('statusBadge').textContent = '就绪';
  document.getElementById('statusBadge').className = 'status idle';
  updateStatus();
  updateTools();
}
function addMessage(text, type, id) {
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  if (id) div.id = id;
  div.innerHTML = text;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
}
function removeMessage(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
}
async function updateStatus() {
  try {
    var res = await fetch('/api/status');
    var data = await res.json();
    document.getElementById('toolCount').textContent = data.tools || '-';
    document.getElementById('taskCount').textContent = data.tasks || '0';
    document.getElementById('successRate').textContent = (data.success_rate ? Math.round(data.success_rate * 100) + '%' : '-');
    document.getElementById('skillCount').textContent = data.skills || '0';
    document.getElementById('trend').textContent = data.trend || '-';
  } catch (e) {}
}
async function updateTools() {
  try {
    var res = await fetch('/api/tools');
    var data = await res.json();
    var list = document.getElementById('toolList');
    list.innerHTML = (data.tools || []).map(function(t) { return '<li>' + t + '</li>'; }).join('');
  } catch (e) {}
}
async function clearMemory() {
  await fetch('/api/clear', { method: 'POST' });
  addMessage('记忆已清空', 'system');
}
async function grow() {
  addMessage('生成挑战任务...', 'system');
  try {
    var res = await fetch('/api/grow', { method: 'POST' });
    var data = await res.json();
    var challenges = data.challenges || [];
    var text = '挑战任务:\n';
    challenges.forEach(function(c) { text += '  [L' + c.difficulty + '] ' + c.task + '\n'; });
    addMessage(text, 'agent');
  } catch (e) {
    addMessage('生成失败: ' + e.message, 'error');
  }
}
function toggleTheme() {
  var body = document.body;
  var btn = document.getElementById('themeBtn');
  body.classList.toggle('light');
  if (body.classList.contains('light')) {
    btn.textContent = '🌙 深色主题';
    localStorage.setItem('theme', 'light');
  } else {
    btn.textContent = '☀️ 浅色主题';
    localStorage.setItem('theme', 'dark');
  }
}
// 恢复上次主题
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('themeBtn').textContent = '🌙 深色主题';
} else {
  document.getElementById('themeBtn').textContent = '☀️ 浅色主题';
}
updateStatus();
updateTools();
setInterval(updateStatus, 10000);
</script>
</body>
</html>
