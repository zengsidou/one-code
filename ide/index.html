<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-Agent IDE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; }
.sidebar { width: 220px; background: #16213e; padding: 16px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #0f3460; }
.sidebar h2 { font-size: 14px; color: #e94560; text-transform: uppercase; letter-spacing: 1px; }
.sidebar .stat { font-size: 12px; color: #888; }
.sidebar .stat span { color: #00d2ff; font-weight: bold; }
.main { flex: 1; display: flex; flex-direction: column; }
.header { background: #16213e; padding: 12px 20px; font-size: 13px; color: #e94560; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.header .status { font-size: 11px; padding: 4px 10px; border-radius: 12px; }
.status.idle { background: #1a3a1a; color: #4caf50; }
.status.running { background: #3a2a1a; color: #ff9800; }
.chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: #0f3460; color: #e0e0e0; }
.msg.agent { align-self: flex-start; background: #1a1a3e; color: #b0b0d0; border: 1px solid #2a2a5e; }
.msg.error { align-self: flex-start; background: #3e1a1a; color: #ff6b6b; border: 1px solid #5e2a2a; }
.msg.system { align-self: center; font-size: 11px; color: #555; background: none; padding: 4px; }
.input-bar { display: flex; padding: 12px 16px; background: #16213e; border-top: 1px solid #0f3460; gap: 8px; }
.input-bar input { flex: 1; padding: 10px 14px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; font-family: inherit; font-size: 13px; outline: none; }
.input-bar input:focus { border-color: #e94560; }
.input-bar button { padding: 10px 20px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; transition: background .2s; }
.input-bar button:hover { background: #ff6b6b; }
.input-bar button:disabled { background: #555; cursor: not-allowed; }
.tool-list { list-style: none; font-size: 11px; color: #777; }
.tool-list li { padding: 2px 0; }
.tool-list li::before { content: '\25B8'; color: #e94560; margin-right: 4px; }
.thinking { animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="sidebar">
  <h2>Micro-Agent</h2>
  <div class="stat">工具: <span id="toolCount">-</span></div>
  <div class="stat">任务: <span id="taskCount">-</span></div>
  <div class="stat">成功率: <span id="successRate">-</span></div>
  <div class="stat">技能: <span id="skillCount">-</span></div>
  <div class="stat">趋势: <span id="trend">-</span></div>
  <hr style="border-color:#0f3460;">
  <h2>工具列表</h2>
  <ul class="tool-list" id="toolList"></ul>
  <hr style="border-color:#0f3460;">
  <button onclick="clearMemory()" style="padding:8px;background:#333;color:#aaa;border:1px solid #555;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;width:100%;">清空记忆</button>
  <button onclick="grow()" style="padding:8px;background:#333;color:#aaa;border:1px solid #555;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;width:100%;margin-top:6px;">生成挑战</button>
</div>
<div class="main">
  <div class="header">
    <span>Micro-Agent IDE - DeepSeek V4</span>
    <span class="status idle" id="statusBadge">就绪</span>
  </div>
  <div class="chat" id="chatBox">
    <div class="msg system">Micro-Agent IDE 已就绪。输入任务开始。</div>
  </div>
  <div class="input-bar">
    <input type="text" id="userInput" placeholder="输入编程任务... (Enter 发送)" onkeydown="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>
<script>
let running = false;

async function send() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg || running) return;
  input.value = '';
  running = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('statusBadge').textContent = '思考中...';
  document.getElementById('statusBadge').className = 'status running';
  addMessage(msg, 'user');
  addMessage('<span class="thinking">思考中...</span>', 'system', 'thinkingMsg');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await res.json();
    removeMessage('thinkingMsg');
    if (data.error) {
      addMessage(data.error, 'error');
    } else {
      addMessage(data.response, 'agent');
    }
  } catch (e) {
    removeMessage('thinkingMsg');
    addMessage('连接失败: ' + e.message, 'error');
  }
  running = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('statusBadge').textContent = '就绪';
  document.getElementById('statusBadge').className = 'status idle';
  updateStatus();
  updateTools();
}

function addMessage(text, type, id) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  if (id) div.id = id;
  div.innerHTML = text;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
}

function removeMessage(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

async function updateStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    document.getElementById('toolCount').textContent = data.tools || '-';
    document.getElementById('taskCount').textContent = data.tasks || '0';
    document.getElementById('successRate').textContent = data.success_rate || '-';
    document.getElementById('skillCount').textContent = data.skills || '0';
    document.getElementById('trend').textContent = data.trend || '-';
  } catch (e) {}
}

async function updateTools() {
  try {
    const res = await fetch('/api/tools');
    const data = await res.json();
    const list = document.getElementById('toolList');
    list.innerHTML = (data.tools || []).map(function(t) { return '<li>' + t + '</li>'; }).join('');
  } catch (e) {}
}

async function clearMemory() {
  await fetch('/api/clear', { method: 'POST' });
  addMessage('记忆已清空', 'system');
}

async function grow() {
  addMessage('生成挑战任务...', 'system');
  try {
    const res = await fetch('/api/grow', { method: 'POST' });
    const data = await res.json();
    var challenges = data.challenges || [];
    var text = '挑战任务:\n';
    challenges.forEach(function(c) {
      text += '  [L' + c.difficulty + '] ' + c.task + '\n';
    });
    addMessage(text, 'agent');
  } catch (e) {
    addMessage('生成失败: ' + e.message, 'error');
  }
}

updateStatus();
updateTools();
setInterval(updateStatus, 10000);
</script>
</body>
</html>
