<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>One-Code</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--fg:#c9d1d9;--fg2:#8b949e;--accent:#58a6ff;--green:#3fb950;--err:#f85149;--warn:#d29922;--border:#30363d;--radius:6px;--fs:16px}
body{font:var(--fs)/1.5 system-ui,sans-serif;background:var(--bg);color:var(--fg);display:flex;height:100vh}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{padding:calc(var(--fs)*0.4) calc(var(--fs)*0.8);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.header .title{font-size:calc(var(--fs)*1.1);font-weight:600;color:var(--accent)}
.header .sep{color:var(--fg2);font-size:calc(var(--fs)*0.7)}
.chat{flex:1;overflow-y:auto;padding:calc(var(--fs)*0.6)}
.msg{margin-bottom:calc(var(--fs)*0.5);padding:calc(var(--fs)*0.4) calc(var(--fs)*0.7);border-radius:var(--radius);max-width:93%;line-height:1.5;font-size:calc(var(--fs)*1);white-space:pre-wrap;word-break:break-word}
.msg.user{background:var(--accent);color:#fff;margin-left:auto}
.msg.agent{background:var(--bg2);border:1px solid var(--border)}
.msg.system{color:var(--fg2);font-size:calc(var(--fs)*0.8);text-align:center;background:transparent;border:none;padding:2px}
.msg.error{background:#3a1a1a;color:var(--err);border:1px solid var(--err)}
.input-bar{padding:calc(var(--fs)*0.5) calc(var(--fs)*0.8);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:calc(var(--fs)*0.3);flex-shrink:0;position:relative}
.input-bar input{flex:1;padding:calc(var(--fs)*0.4) calc(var(--fs)*0.7);background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:var(--radius);font-size:calc(var(--fs)*1);outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar button{padding:calc(var(--fs)*0.4) calc(var(--fs)*1);background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:calc(var(--fs)*0.9);font-weight:600}
.mode-btn{padding:1px 8px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--fg2);cursor:pointer;font-size:calc(var(--fs)*0.75)}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* context usage circle */
.ctx-circle{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);display:inline-block;position:relative;cursor:pointer;flex-shrink:0}
.ctx-circle:hover{border-color:var(--accent)}
.ctx-tooltip{display:none;position:absolute;bottom:120%;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:calc(var(--fs)*0.6);font-size:calc(var(--fs)*0.8);z-index:200;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.ctx-circle:hover .ctx-tooltip{display:block}
/* right panel */
.sidebar{width:calc(var(--fs)*11);background:var(--bg2);border-left:1px solid var(--border);padding:calc(var(--fs)*0.6);font-size:calc(var(--fs)*0.75);flex-shrink:0;overflow-y:auto}
.sidebar h3{color:var(--fg2);font-size:calc(var(--fs)*0.75);margin-bottom:calc(var(--fs)*0.3);text-transform:uppercase;letter-spacing:.5px}
.sidebar .t{padding:2px 0;display:flex;gap:4px;align-items:center}
#suggestBox div{padding:calc(var(--fs)*0.4) calc(var(--fs)*0.7);cursor:pointer;font-size:calc(var(--fs)*0.85);color:var(--fg);border-bottom:1px solid var(--border)}
#suggestBox div:hover{background:var(--bg3)}
.thinking{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
select{background:var(--bg3);color:var(--accent);border:1px solid var(--border);border-radius:3px;font-size:calc(var(--fs)*0.7);padding:1px 3px;cursor:pointer}
</style></head><body>
<div class="main">
 <div class="header">
  <span class="title" style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block" id="dot"></span>One-Code</span>
  <span id="cwd" style="color:var(--fg2);font-size:calc(var(--fs)*0.7)">...</span>
  <span style="margin-left:auto;display:flex;align-items:center;gap:6px">
   <select id="modelSel" onchange="switchModel(this.value)"></select>
   <button class="mode-btn active" onclick="setMode('build')">Build</button>
   <button class="mode-btn" onclick="setMode('plan')">Plan</button>
   <div class="ctx-circle" id="ctxCircle">
    <div class="ctx-tooltip"><span id="ctxTokens">0</span> tokens | <span id="ctxCost">$0</span></div>
   </div>
  </span>
 </div>
 <div class="chat" id="chat"><div class="msg system">One-Code ready. Type a task and press Enter.</div></div>
 <div class="input-bar">
  <input type="text" id="inp" placeholder="Write a coding task..." onkeydown="if(event.key==='Enter')send()" oninput="showSuggest(event)" autocomplete="off">
  <button onclick="send()">Send</button>
  <div id="suggestBox" style="display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);max-height:160px;overflow-y:auto;z-index:100"></div>
 </div>
</div>
<div class="sidebar">
 <h3>Tasks</h3><div id="taskList"></div>
</div>
<script>
var esc=s=>{var d=document.createElement('div');d.textContent=s;return d.innerHTML};
var step=0;
function send(){
 var t=document.getElementById('inp').value.trim();if(!t)return;
 document.getElementById('inp').value='';
 document.getElementById('dot').style.background='var(--warn)';
 chat('<b>'+esc(t)+'</b>','user');
 chat('<span class="thinking">...</span>','system','thinking');
 step++;
 fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})})
  .then(r=>r.json()).then(d=>{
   var el=document.getElementById('thinking');if(el)el.remove();
   if(d.error)chat(d.error,'error');
   else chat(d.response,'agent');
   document.getElementById('dot').style.background='var(--green)';
  }).catch(e=>{
   var el=document.getElementById('thinking');if(el)el.remove();
   chat('Connection failed','error');
   document.getElementById('dot').style.background='var(--err)';
  });
}
function chat(text,type,id){
 var d=document.createElement('div');d.className='msg '+type;if(id)d.id=id;
 if(type==='agent')d.innerHTML=md(text);else d.innerHTML=text;
 document.getElementById('chat').appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
}
function md(t){t=esc(t);t=t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');t=t.replace(/\n/g,'<br>');return t}
async function loadModels(){
 var r=await fetch('/api/models');var d=await r.json();
 var s=document.getElementById('modelSel');s.innerHTML='';
 d.models.forEach(function(m){s.innerHTML+='<option value=\"'+m.id+'\">'+m.name+'</option>'});
}
function switchModel(m){fetch('/api/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:m})})}
function setMode(m){
 fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:m})});
 document.querySelectorAll('.mode-btn').forEach(function(b,i){b.classList.toggle('active',i==(m==='build'?0:1))});
}
async function poll(){
 try{var r=await fetch('/api/usage');var d=await r.json();
  document.getElementById('ctxTokens').textContent=d.tokens||0;
  document.getElementById('ctxCost').textContent='$'+(d.cost||0).toFixed(4);
  var pct=Math.min(100,((d.tokens||0)/(d.max_tokens||65536))*100);
  document.getElementById('ctxCircle').style.background='conic-gradient(var(--accent) '+pct+'%,transparent 0)';
 }catch(e){}
 try{var r2=await fetch('/api/tasks');var d2=await r2.json();
  var h='';d2.tasks.forEach(function(t){
   var s={'pending':'○','in_progress':'●','done':'✓','abandoned':'✗'}[t.status]||'?';
   h+='<div class="t">'+s+' '+esc(t.title)+'</div>';
  });
  document.getElementById('taskList').innerHTML=h||'<div class="t" style="color:var(--fg2)">no tasks</div>';
 }catch(e){}
}
var sc=[];
fetch('/api/suggest?q=').then(r=>r.json()).then(d=>{sc=d.suggestions||[]});
function showSuggest(e){
 var q=e.target.value.toLowerCase();if(!q){document.getElementById('suggestBox').style.display='none';return}
 var m=sc.filter(s=>s.toLowerCase().includes(q)).slice(0,5);
 if(!m.length){document.getElementById('suggestBox').style.display='none';return}
 var b=document.getElementById('suggestBox');
 b.innerHTML=m.map(s=>'<div onclick="pick(\''+esc(s)+'\')">'+esc(s)+'</div>').join('');
 b.style.display='block';
}
function pick(t){document.getElementById('inp').value=t;document.getElementById('suggestBox').style.display='none';send()}
(function(){
 var dpr=window.devicePixelRatio||1;
 document.documentElement.style.setProperty('--fs',Math.max(14,Math.min(36,Math.round(14*dpr*(screen.availWidth/1920))))+'px');
})();
fetch('/api/cwd').then(r=>r.json()).then(d=>{document.getElementById('cwd').textContent=d.cwd||'-'});
loadModels();setInterval(poll,3000);
</script></body></html>
